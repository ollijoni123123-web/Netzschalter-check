<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provisionsrechner PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#0b1a3a; color:white; }
h1 { text-align:center; padding:15px; }
.container { padding:10px; }
.card {
    background:#132a5e;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}
input, select, button {
    width:100%;
    padding:10px;
    margin-top:8px;
}
button {
    background:#2196f3;
    color:white;
    border:none;
}
.entry {
    border-bottom:1px solid #2c3e80;
    padding:8px;
}
.small { width:auto; padding:5px; }

.kaffee { color:#6f4e37; }
.snack { color:silver; }
.wasser { color:#4da6ff; }

canvas {
    width:100% !important;
    height:260px !important;
}
</style>
</head>

<body>

<h1>💰 Provisionsrechner</h1>

<div class="container">

<div class="card">
<h3>➕ Eintrag</h3>

<select id="produkt">
<option value="Kaffee">☕ Kaffee</option>
<option value="Snack">🍫 Snack</option>
<option value="Wasser">💧 Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">

<label>📅 Datum auswählen</label>
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<h3>📅 Monatsübersicht</h3>
<p id="monat"></p>
<p id="letzter"></p>
</div>

<div class="card">
<h3>📦 Kategorien (Provision)</h3>
<p id="stats"></p>
</div>

<div class="card">
<h3>📊 Geräte verkauft</h3>
<p id="anzahl"></p>
</div>

<div class="card">
<h3>📊 Diagramm</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>🗓 Einträge</h3>
<div id="liste"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("provData")) || [];
let chart;

function save() {
    localStorage.setItem("provData", JSON.stringify(data));
}

function addEntry() {
    let u = parseFloat(umsatz.value);
    let pr = parseFloat(provision.value);
    let d = datum.value;
    let p = produkt.value;

    if (!u || !pr || !d) return alert("Bitte alles ausfüllen");

    data.push({
        id: Date.now(),
        produkt: p,
        umsatz: u,
        provision: pr,
        datum: d,
        prov: u * pr / 100
    });

    save();
    update();
}

function monthKey(date) {
    let dt = new Date(date);
    return dt.getFullYear() + "-" + dt.getMonth();
}

function update() {
    let now = new Date();
    let current = monthKey(now);
    let lastKey = monthKey(new Date(now.getFullYear(), now.getMonth()-1, 1));

    let sum = 0;
    let last = 0;

    let kaffe = 0, snack = 0, wasser = 0;
    let countK = 0, countS = 0, countW = 0;

    data.forEach(e => {
        let k = monthKey(e.datum);

        if (k === current) sum += e.prov;
        if (k === lastKey) last += e.prov;

        if (e.produkt === "Kaffee") {
            kaffe += e.prov;
            countK++;
        }
        if (e.produkt === "Snack") {
            snack += e.prov;
            countS++;
        }
        if (e.produkt === "Wasser") {
            wasser += e.prov;
            countW++;
        }
    });

    monat.innerText = "Aktuell: " + sum.toFixed(2) + " €";
    letzter.innerText = "Vormonat: " + last.toFixed(2) + " €";

    stats.innerHTML =
        "<span class='kaffee'>☕ Kaffee:</span> " + kaffe.toFixed(2) + " €<br>" +
        "<span class='snack'>🍫 Snack:</span> " + snack.toFixed(2) + " €<br>" +
        "<span class='wasser'>💧 Wasser:</span> " + wasser.toFixed(2) + " €";

    anzahl.innerHTML =
        "<span class='kaffee'>☕ Kaffee:</span> " + countK + " Stück<br>" +
        "<span class='snack'>🍫 Snack:</span> " + countS + " Stück<br>" +
        "<span class='wasser'>💧 Wasser:</span> " + countW + " Stück";

    render();
    draw(kaffe, snack, wasser);
}

function render() {
    liste.innerHTML="";
    data.sort((a,b)=>b.id-a.id);

    data.forEach(e => {
        let div = document.createElement("div");
        div.className = "entry";

        div.innerHTML =
            "<b>" + e.datum + "</b> | " +
            e.produkt + " | " +
            e.umsatz + "€ → " +
            e.prov.toFixed(2) + "€<br>" +
            "<button class='small' onclick='del(" + e.id + ")'>❌ Löschen</button>";

        liste.appendChild(div);
    });
}

function del(id) {
    data = data.filter(e => e.id !== id);
    save();
    update();
}

function draw(kaffe, snack, wasser) {
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "doughnut",
        data: {
            labels: ["Kaffee", "Snack", "Wasser"],
            datasets: [{
                data: [kaffe, snack, wasser],
                backgroundColor: [
                    "#6f4e37",
                    "silver",
                    "#4da6ff"
                ]
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: "white" }
                }
            },
            cutout: "60%"
        }
    });
}

update();
</script>

</body>
</html>
