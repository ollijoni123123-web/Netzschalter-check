<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provisionsrechner PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#0b1a3a; color:white; }
h1 { text-align:center; padding:15px; }
.container { padding:10px; }

.card {
    background:#132a5e;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

input, select, button {
    width:100%;
    padding:10px;
    margin-top:8px;
}

button {
    background:#2196f3;
    color:white;
    border:none;
}

.entry {
    border-bottom:1px solid #2c3e80;
    padding:8px;
}

.progress {
    background:#1e3c72;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.progress-bar {
    height:20px;
    background:#4caf50;
    text-align:center;
    font-size:12px;
}

canvas { height:260px !important; }
</style>
</head>

<body>

<h1>💰 Provisionsrechner</h1>

<div class="container">

<div class="card">
<h3>➕ Eintrag</h3>

<select id="produkt">
<option>Kaffee</option>
<option>Snack</option>
<option>Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<h3>📅 Monat auswählen</h3>
<select id="monatFilter" onchange="update()"></select>
</div>

<div class="card">
<h3>📊 Monatsübersicht</h3>
<p id="monat"></p>
<p id="trend"></p>
</div>

<div class="card">
<h3>📅 Wochenübersicht</h3>
<div id="wochen"></div>
</div>

<div class="card">
<h3>📊 Vergleich</h3>
<canvas id="vergleichChart"></canvas>
</div>

<div class="card">
<h3>📄 Export</h3>
<button onclick="exportPDF()">PDF erstellen</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("provData")) || [];
let chart;
let vergleichChart;

// Datum automatisch
datum.valueAsDate = new Date();

function save(){
    localStorage.setItem("provData", JSON.stringify(data));
}

function addEntry(){
    let u = parseFloat(umsatz.value);
    let pr = parseFloat(provision.value);
    let d = datum.value;

    if(!u || !pr || !d) return alert("Fehlt was!");

    data.push({
        id: Date.now(),
        produkt: produkt.value,
        datum: d,
        prov: u * pr / 100
    });

    save();
    fillMonate();
    update();
}

function monthKey(d){
    let dt = new Date(d);
    return dt.getFullYear()+"-"+dt.getMonth();
}

function fillMonate(){
    monatFilter.innerHTML="";
    let map={};

    data.forEach(e=> map[monthKey(e.datum)] = e.datum);

    Object.keys(map).sort().reverse().forEach(k=>{
        let d=new Date(map[k]);
        let opt=document.createElement("option");
        opt.value=k;
        opt.text=d.toLocaleString("de-DE",{month:"long",year:"numeric"});
        monatFilter.appendChild(opt);
    });
}

function getLastMonth(key){
    let [y,m]=key.split("-").map(Number);
    let d=new Date(y,m-1,1);
    return d.getFullYear()+"-"+d.getMonth();
}

function getWeek(date){
    let d=new Date(date);
    let start=new Date(d.getFullYear(), d.getMonth(), 1);
    return Math.ceil((d.getDate()+start.getDay())/7);
}

function update(){
    let selected=monatFilter.value;
    let lastKey=getLastMonth(selected);

    let sum=0,last=0;
    let weeks={};

    data.forEach(e=>{
        let k=monthKey(e.datum);

        if(k===selected){
            sum+=e.prov;

            let w=getWeek(e.datum);
            weeks[w]=(weeks[w]||0)+e.prov;
        }

        if(k===lastKey) last+=e.prov;
    });

    monat.innerText="Provision: "+sum.toFixed(2)+" €";

    let diff=sum-last;
    trend.innerText = diff>=0
        ? "📈 +"+diff.toFixed(2)+" € besser"
        : "📉 "+diff.toFixed(2)+" € schlechter";

    // Wochen
    wochen.innerHTML="";
    Object.keys(weeks).forEach(w=>{
        wochen.innerHTML += "Woche "+w+": "+weeks[w].toFixed(2)+" €<br>";
    });

    drawVergleich(sum,last);
}

function drawVergleich(current,last){
    if(vergleichChart) vergleichChart.destroy();

    vergleichChart = new Chart(vergleichChartEl,{
        type:"bar",
        data:{
            labels:["Vormonat","Aktuell"],
            datasets:[{
                data:[last,current]
            }]
        }
    });
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let selected=monatFilter.options[monatFilter.selectedIndex].text;

    doc.text("Provisionsbericht", 20,20);
    doc.text("Monat: "+selected, 20,30);
    doc.text(monat.innerText, 20,40);
    doc.text(trend.innerText, 20,50);

    doc.save("bericht.pdf");
}

let vergleichChartEl=document.getElementById("vergleichChart");

fillMonate();
update();
</script>

</body>
</html>
