<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provisionsrechner PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(180deg, #4facfe, #00f2fe);
}
h1 {
    text-align: center;
    color: white;
    padding: 15px;
}
.container { padding: 10px; }
.card {
    background: white;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #4facfe;
    color: white;
    font-weight: bold;
}
.small-btn {
    width: auto;
    padding: 6px 10px;
    margin-top: 5px;
}
.entry {
    border-bottom: 1px solid #eee;
    padding: 10px;
}
.success { color: green; }
.error { color: red; }
canvas {
    width: 100% !important;
    height: 250px !important;
}
</style>
</head>

<body>

<h1>💰 Provisionsrechner</h1>

<div class="container">

<div class="card">
    <h3>➕ Eintrag</h3>
    <select id="produkt">
        <option>Kaffee ☕</option>
        <option>Snack 🍫</option>
        <option>Wasser 💧</option>
    </select>
    <input type="number" id="umsatz" placeholder="Umsatz €">
    <input type="number" id="provision" placeholder="Provision %">
    <input type="date" id="datum">
    <button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
    <h3>📅 Monatsübersicht</h3>
    <p id="monatSumme"></p>
    <p id="letzterMonat"></p>
</div>

<div class="card">
    <h3>📊 Statistik</h3>
    <p id="stats"></p>
</div>

<div class="card">
    <h3>✅ Abgleich</h3>
    <select id="vergleichMonat"></select>
    <input type="number" id="istProvision" placeholder="Ausgezahlt €">
    <button onclick="checkProvision()">Prüfen</button>
    <p id="checkResult"></p>
</div>

<div class="card">
    <h3>📈 Verlauf</h3>
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h3>🗓 Einträge</h3>
    <div id="liste"></div>
</div>

</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let chart;

function save() {
    localStorage.setItem("daten", JSON.stringify(daten));
}

function addEntry() {
    const produkt = document.getElementById("produkt").value;
    const umsatz = parseFloat(document.getElementById("umsatz").value);
    const provision = parseFloat(document.getElementById("provision").value);
    const datum = document.getElementById("datum").value;

    if (!umsatz || !provision || !datum) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    daten.push({
        id: Date.now(),
        produkt,
        umsatz,
        provision,
        datum,
        prov: umsatz * provision / 100
    });

    save();
    update();
}

function getMonthKey(date) {
    return date.getFullYear() + "-" + date.getMonth();
}

function update() {
    const now = new Date();
    const currentKey = getMonthKey(now);

    const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const lastKey = getMonthKey(lastMonthDate);

    let sum = 0;
    let last = 0;

    let stats = { Kaffee:0, Snack:0, Wasser:0 };

    daten.forEach(d => {
        const dt = new Date(d.datum);
        const key = getMonthKey(dt);

        if (key === currentKey) sum += d.prov;
        if (key === lastKey) last += d.prov;

        let p = d.produkt.split(" ")[0];
        stats[p] += d.prov;
    });

    document.getElementById("monatSumme").innerText =
        "Dieser Monat: " + sum.toFixed(2) + " €";

    document.getElementById("letzterMonat").innerText =
        "Letzter Monat: " + last.toFixed(2) + " €";

    document.getElementById("stats").innerHTML =
        "☕ Kaffee: " + stats.Kaffee.toFixed(2) + " €<br>" +
        "🍫 Snack: " + stats.Snack.toFixed(2) + " €<br>" +
        "💧 Wasser: " + stats.Wasser.toFixed(2) + " €";

    fillDropdown();
    renderList();
    drawChart();
}

function fillDropdown() {
    const select = document.getElementById("vergleichMonat");
    select.innerHTML = "";

    let seen = {};

    daten.forEach(d => {
        const dt = new Date(d.datum);
        const key = getMonthKey(dt);
        seen[key] = dt;
    });

    Object.values(seen).forEach(dt => {
        const opt = document.createElement("option");
        opt.value = getMonthKey(dt);
        opt.text = dt.toLocaleString("de-DE", { month: "long", year: "numeric" });
        select.appendChild(opt);
    });
}

function checkProvision() {
    const key = document.getElementById("vergleichMonat").value;
    const ist = parseFloat(document.getElementById("istProvision").value);

    let soll = 0;

    daten.forEach(d => {
        const dt = new Date(d.datum);
        if (getMonthKey(dt) === key) {
            soll += d.prov;
        }
    });

    const diff = ist - soll;
    const el = document.getElementById("checkResult");

    if (Math.abs(diff) < 0.01) {
        el.innerText = "✅ Passt genau!";
        el.className = "success";
    } else {
        el.innerText = "❌ Abweichung: " + diff.toFixed(2) + " €";
        el.className = "error";
    }
}

function renderList() {
    const liste = document.getElementById("liste");
    liste.innerHTML = "";

    daten.sort((a,b)=>b.id-a.id);

    daten.forEach(d => {
        const div = document.createElement("div");
        div.className = "entry";

        div.innerHTML =
            "<b>"+d.datum+"</b><br>" +
            d.produkt+" | "+d.umsatz+"€ → "+d.prov.toFixed(2)+"€<br>" +
            "<button class='small-btn' onclick='edit("+d.id+")'>✏️</button> " +
            "<button class='small-btn' onclick='del("+d.id+")'>❌</button>";

        liste.appendChild(div);
    });
}

function del(id) {
    daten = daten.filter(d => d.id !== id);
    save();
    update();
}

function edit(id) {
    const d = daten.find(x => x.id === id);

    document.getElementById("produkt").value = d.produkt;
    document.getElementById("umsatz").value = d.umsatz;
    document.getElementById("provision").value = d.provision;
    document.getElementById("datum").value = d.datum;

    del(id);
}

function drawChart() {
    const labels = daten.map(d => d.datum);
    const values = daten.map(d => d.prov);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Provision",
                data: values
            }]
        }
    });
}

update();
</script>

</body>
</html>
