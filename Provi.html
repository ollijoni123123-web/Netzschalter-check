<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provisionsrechner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #e3f2fd;
}
h1 {
    text-align: center;
    padding: 15px;
}
.container { padding: 10px; }
.card {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}
input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}
button {
    background: #2196f3;
    color: white;
    border: none;
}
.entry {
    border-bottom: 1px solid #ddd;
    padding: 8px;
}
</style>
</head>

<body>

<h1>💰 Provisionsrechner</h1>

<div class="container">

<div class="card">
<h3>Eintrag</h3>
<select id="produkt">
<option>Kaffee</option>
<option>Snack</option>
<option>Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<h3>Monat</h3>
<p id="monat"></p>
<p id="letzter"></p>
</div>

<div class="card">
<h3>Abgleich</h3>
<select id="monatSelect"></select>
<input type="number" id="ist" placeholder="Ist Provision">
<button onclick="check()">Prüfen</button>
<p id="result"></p>
</div>

<div class="card">
<h3>Liste</h3>
<div id="liste"></div>
</div>

<div class="card">
<h3>Diagramm</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("provData")) || [];
let chart;

function save() {
    localStorage.setItem("provData", JSON.stringify(data));
}

function addEntry() {
    let p = produkt.value;
    let u = parseFloat(umsatz.value);
    let pr = parseFloat(provision.value);
    let d = datum.value;

    if (!u || !pr || !d) {
        alert("Bitte alles ausfüllen");
        return;
    }

    data.push({
        id: Date.now(),
        produkt: p,
        umsatz: u,
        prov: u * pr / 100,
        datum: d
    });

    save();
    update();
}

function monthKey(d) {
    let dt = new Date(d);
    return dt.getFullYear() + "-" + dt.getMonth();
}

function update() {
    let now = new Date();
    let current = monthKey(now);

    let lastDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    let lastKey = monthKey(lastDate);

    let sum = 0;
    let last = 0;

    data.forEach(e => {
        let k = monthKey(e.datum);
        if (k === current) sum += e.prov;
        if (k === lastKey) last += e.prov;
    });

    monat.innerText = "Dieser Monat: " + sum.toFixed(2) + " €";
    letzter.innerText = "Letzter Monat: " + last.toFixed(2) + " €";

    fillSelect();
    render();
    draw();
}

function fillSelect() {
    monatSelect.innerHTML = "";
    let map = {};

    data.forEach(e => {
        map[monthKey(e.datum)] = e.datum;
    });

    for (let key in map) {
        let d = new Date(map[key]);
        let opt = document.createElement("option");
        opt.value = key;
        opt.text = d.toLocaleString("de-DE", {month:"long", year:"numeric"});
        monatSelect.appendChild(opt);
    }
}

function check() {
    let key = monatSelect.value;
    let istVal = parseFloat(ist.value);

    let soll = 0;

    data.forEach(e => {
        if (monthKey(e.datum) === key) soll += e.prov;
    });

    let diff = istVal - soll;

    result.innerText = Math.abs(diff) < 0.01
        ? "✅ OK"
        : "❌ " + diff.toFixed(2) + " €";
}

function render() {
    liste.innerHTML = "";

    data.sort((a,b)=>b.id-a.id);

    data.forEach(e => {
        let div = document.createElement("div");
        div.className = "entry";

        div.innerHTML =
            e.datum + " | " +
            e.produkt + " | " +
            e.umsatz + "€ → " +
            e.prov.toFixed(2) + "€";

        liste.appendChild(div);
    });
}

function draw() {
    let labels = data.map(e => e.datum);
    let values = data.map(e => e.prov);

    if (chart) chart.destroy();

    chart = new Chart(chartEl, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Provision",
                data: values
            }]
        }
    });
}

let chartEl = document.getElementById("chart");

update();
</script>

</body>
</html>
