<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punkte Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button, input {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
}

.section {
  margin-top: 25px;
}
</style>
</head>

<body>

<h2>📊 Punkte Tracker</h2>

<input type="date" id="datePicker">
<br>
<input type="month" id="monthPicker">

<div id="buttons"></div>

<div class="section">
  <h3 id="dayTotal"></h3>
</div>

<div class="section">
  <h3>📅 Monat gesamt:</h3>
  <div id="monthTotal"></div>
</div>

<div class="section">
  <h3>📊 Monatsvergleich</h3>
  <div id="compareMonths"></div>
</div>

<div class="section">
  <button onclick="exportData()">📄 Export anzeigen</button>
  <button onclick="createPDF()">📄 PDF erstellen</button>
  <button onclick="clearAll()">🧹 Alles löschen</button>
</div>

<script>
const tasks = [
  ["Service Wasser", 1.25, "Service"],
  ["Service Kaffee", 1.25, "Service"],
  ["Service Snack", 1.5, "Service"],
  ["Wartung Wasser", 1, "Wartung"],
  ["Wartung Snack", 0.75, "Wartung"],
  ["Wartung Kaffee", 1, "Wartung"],
  ["Installation Wasser", 2, "Installation"],
  ["Installation Snack", 2, "Installation"],
  ["Installation Kaffee", 2, "Installation"],
  ["BVO", 1.25, "Sonstiges"],
  ["Nachrüstung", 1.25, "Sonstiges"],
  ["Krank", 2.75, "Sonstiges"],
  ["Urlaub", 2.75, "Sonstiges"]
];

const datePicker = document.getElementById("datePicker");
const monthPicker = document.getElementById("monthPicker");

const today = new Date().toISOString().slice(0,10);
datePicker.value = today;
monthPicker.value = today.slice(0,7);

function loadData() {
  return JSON.parse(localStorage.getItem("points") || "{}");
}

function saveData(data) {
  localStorage.setItem("points", JSON.stringify(data));
}

function addTask(name, value, category) {
  let data = loadData();
  let date = datePicker.value;

  if (!data[date]) data[date] = [];

  data[date].push({name, value, category});
  saveData(data);
  render();
}

function render() {
  const data = loadData();
  const selectedMonth = monthPicker.value;

  let monthSum = 0;

  Object.keys(data).forEach(date => {
    if (date.startsWith(selectedMonth)) {
      data[date].forEach(t => {
        monthSum += t.value;
      });
    }
  });

  document.getElementById("monthTotal").innerHTML =
    monthSum.toFixed(2) + " Punkte";

  // Vergleich
  let prev = new Date(selectedMonth + "-01");
  prev.setMonth(prev.getMonth() - 1);
  let prevKey = prev.toISOString().slice(0,7);

  let prevSum = 0;

  Object.keys(data).forEach(date => {
    if (date.startsWith(prevKey)) {
      data[date].forEach(t => prevSum += t.value);
    }
  });

  document.getElementById("compareMonths").innerHTML =
    "Aktuell: " + monthSum.toFixed(2) +
    " | Vormonat: " + prevSum.toFixed(2) +
    " | Differenz: " + (monthSum - prevSum).toFixed(2);
}

function exportData() {
  const data = loadData();
  const selectedMonth = monthPicker.value;

  let text = "Datum | Tätigkeit | Punkte\n\n";

  Object.keys(data).forEach(date => {
    if (date.startsWith(selectedMonth)) {
      data[date].forEach(t => {
        text += date + " | " + t.name + " | " + t.value + "\n";
      });
    }
  });

  alert(text);
}

function createPDF() {
  const data = loadData();
  const selectedMonth = monthPicker.value;

  let content = "<h2>Punkte Bericht " + selectedMonth + "</h2>";

  let sum = 0;

  Object.keys(data).forEach(date => {
    if (date.startsWith(selectedMonth)) {
      data[date].forEach(t => {
        content += "<p>" + date + " - " + t.name + " (" + t.value + ")</p>";
        sum += t.value;
      });
    }
  });

  content += "<h3>Gesamt: " + sum.toFixed(2) + " Punkte</h3>";

  let win = window.open("", "", "width=600,height=600");
  win.document.write(content);
  win.document.close();
  win.print();
}

function clearAll() {
  if (confirm("Alles löschen?")) {
    localStorage.removeItem("points");
    render();
  }
}

const btnDiv = document.getElementById("buttons");
tasks.forEach(t => {
  const btn = document.createElement("button");
  btn.innerText = t[0];
  btn.onclick = () => addTask(t[0], t[1], t[2]);
  btnDiv.appendChild(btn);
});

monthPicker.addEventListener("change", render);
datePicker.addEventListener("change", render);

render();
</script>

</body>
</html>
