<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punkte Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button, input {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
}

.section {
  margin-top: 25px;
}

.entry {
  background: #1e293b;
  margin: 5px auto;
  padding: 10px;
  max-width: 400px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.delete {
  background: red;
  padding: 5px 10px;
  border-radius: 8px;
}

.compare {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>📊 Punkte Tracker</h2>

<input type="date" id="datePicker">
<br>
<input type="month" id="monthPicker">

<div id="buttons"></div>

<div class="section">
  <h3 id="dayTotal"></h3>
</div>

<div id="dayList"></div>

<div class="section">
  <h3>📅 Monat gesamt:</h3>
  <div id="monthTotal"></div>
</div>

<!-- 🔥 CHEF VERGLEICH -->
<div class="section">
  <h3>👨‍💼 Chef Abgleich</h3>
  <input type="number" id="bossInput" placeholder="Chef Punkte eingeben">
  <button onclick="saveBoss()">Speichern</button>
  <button onclick="useBoss()">Chef übernehmen</button>
  <div id="compareResult" class="compare"></div>
</div>

<div class="section">
  <h3>📊 Kategorien</h3>
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <button onclick="exportData()">📄 Export anzeigen</button>
  <button onclick="clearAll()">🧹 Alles löschen</button>
</div>

<script>
const tasks = [
  ["Service Wasser", 1.25, "Service"],
  ["Service Kaffee", 1.25, "Service"],
  ["Service Snack", 1.5, "Service"],
  ["Wartung Wasser", 1, "Wartung"],
  ["Wartung Snack", 0.75, "Wartung"],
  ["Wartung Kaffee", 1, "Wartung"],
  ["Installation Wasser", 2, "Installation"],
  ["Installation Snack", 2, "Installation"],
  ["Installation Kaffee", 2, "Installation"],
  ["BVO", 1.25, "Sonstiges"],
  ["Nachrüstung", 1.25, "Sonstiges"],
  ["Krank", 2.75, "Sonstiges"],
  ["Urlaub", 2.75, "Sonstiges"]
];

const datePicker = document.getElementById("datePicker");
const monthPicker = document.getElementById("monthPicker");

const today = new Date().toISOString().slice(0,10);
datePicker.value = today;
monthPicker.value = today.slice(0,7);

function loadData() {
  return JSON.parse(localStorage.getItem("points") || "{}");
}

function saveData(data) {
  localStorage.setItem("points", JSON.stringify(data));
}

function loadBoss() {
  return JSON.parse(localStorage.getItem("boss") || "{}");
}

function saveBoss() {
  let boss = loadBoss();
  boss[monthPicker.value] = Number(document.getElementById("bossInput").value);
  localStorage.setItem("boss", JSON.stringify(boss));
  render();
}

function useBoss() {
  let boss = loadBoss();
  let data = loadData();
  let month = monthPicker.value;

  if (!boss[month]) return;

  let diff = boss[month];

  data = {}; // alles löschen
  data[month + "-01"] = [{name: "Chef übernommen", value: diff, category: "Sonstiges"}];

  saveData(data);
  render();
}

function addTask(name, value, category) {
  let data = loadData();
  let date = datePicker.value;

  if (!data[date]) data[date] = [];

  data[date].push({name, value, category});
  saveData(data);

  render();
}

function deleteEntry(index) {
  let data = loadData();
  let date = datePicker.value;

  data[date].splice(index, 1);
  if (data[date].length === 0) delete data[date];

  saveData(data);
  render();
}

function render() {
  const data = loadData();
  const boss = loadBoss();
  const selectedDate = datePicker.value;
  const selectedMonth = monthPicker.value;

  let daySum = 0;
  let monthSum = 0;

  let categories = {
    Service: 0,
    Wartung: 0,
    Installation: 0,
    Sonstiges: 0
  };

  let dayHtml = "";

  if (data[selectedDate]) {
    data[selectedDate].forEach((t, i) => {
      daySum += t.value;

      dayHtml += `
      <div class="entry">
        ${t.name} (${t.value})
        <button class="delete" onclick="deleteEntry(${i})">X</button>
      </div>`;
    });
  }

  Object.keys(data).forEach(date => {
    if (date.startsWith(selectedMonth)) {
      data[date].forEach(t => {
        monthSum += t.value;
        categories[t.category] += t.value;
      });
    }
  });

  document.getElementById("dayTotal").innerHTML =
    "Tag: " + daySum.toFixed(2) + " Punkte";

  document.getElementById("dayList").innerHTML = dayHtml;

  document.getElementById("monthTotal").innerHTML =
    monthSum.toFixed(2) + " Punkte";

  // 🔥 Vergleich
  if (boss[selectedMonth]) {
    let diff = (monthSum - boss[selectedMonth]).toFixed(2);
    let text = "Chef: " + boss[selectedMonth] + " | Du: " + monthSum;

    if (diff == 0) {
      text += " ✅ passt";
    } else {
      text += " ❗ Abweichung: " + diff;
    }

    document.getElementById("compareResult").innerHTML = text;
  }

  drawChart(categories);
}

let chart;

function drawChart(categories) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: Object.keys(categories),
      datasets: [{
        data: Object.values(categories)
      }]
    }
  });
}

function exportData() {
  const data = loadData();
  const selectedMonth = monthPicker.value;

  let text = "Datum | Tätigkeit | Punkte | Kategorie\n\n";

  Object.keys(data).forEach(date => {
    if (date.startsWith(selectedMonth)) {
      data[date].forEach(t => {
        text += date + " | " + t.name + " | " + t.value + " | " + t.category + "\n";
      });
    }
  });

  alert(text);
}

function clearAll() {
  if (confirm("Wirklich ALLES löschen?")) {
    localStorage.removeItem("points");
    render();
  }
}

const btnDiv = document.getElementById("buttons");
tasks.forEach(t => {
  const btn = document.createElement("button");
  btn.innerText = t[0] + " (" + t[1] + ")";
  btn.onclick = () => addTask(t[0], t[1], t[2]);
  btnDiv.appendChild(btn);
});

datePicker.addEventListener("change", render);
monthPicker.addEventListener("change", render);

render();
</script>

</body>
</html>
