<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punkte Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button, input {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  color: white;
}

.section {
  margin-top: 25px;
}

/* 🔥 GRID FÜR 3 BUTTONS */
#buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 400px;
  margin: auto;
}

.group-space {
  grid-column: span 3;
  height: 15px;
}

.entry {
  background: #1e293b;
  margin: 5px auto;
  padding: 10px;
  max-width: 400px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.delete {
  background: red;
}

canvas {
  max-width: 400px;
  margin: auto;
}
</style>
</head>

<body>

<h2>📊 Punkte Tracker</h2>

<input type="date" id="datePicker">
<br>
<input type="month" id="monthPicker">

<div id="buttons"></div>

<div class="section">
  <h3 id="dayTotal"></h3>
</div>

<div id="dayList"></div>

<div class="section">
  <h3>📅 Monat gesamt:</h3>
  <div id="monthTotal"></div>
</div>

<div class="section">
  <h3>👨‍💼 Chef Abgleich</h3>
  <input type="number" id="bossInput">
  <button onclick="saveBoss()">Speichern</button>
  <div id="compareBoss"></div>
</div>

<div class="section">
  <h3>📊 Kategorien</h3>
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <h3>📊 Monatsvergleich</h3>
  <div id="compareMonths"></div>
</div>

<div class="section">
  <button onclick="exportData()">📄 Export</button>
  <button onclick="createPDF()">📄 PDF</button>
  <button onclick="clearAll()">🧹 Reset</button>
</div>

<script>
const tasks = [
  ["Service Wasser", 1.25, "Service"],
  ["Service Kaffee", 1.25, "Service"],
  ["Service Snack", 1.5, "Service"],

  ["Wartung Wasser", 1, "Wartung"],
  ["Wartung Kaffee", 1, "Wartung"],
  ["Wartung Snack", 0.75, "Wartung"],

  ["Installation Wasser", 2, "Installation"],
  ["Installation Kaffee", 2, "Installation"],
  ["Installation Snack", 2, "Installation"],

  ["BVO", 1.25, "Sonstiges"],
  ["Nachrüstung", 1.25, "Sonstiges"],
  ["Krank", 2.75, "Sonstiges"],
  ["Urlaub", 2.75, "Sonstiges"]
];

function getColor(name){
  if(name.includes("Wasser")) return "#3b82f6";
  if(name.includes("Kaffee")) return "#6b3f1d";
  if(name.includes("Snack")) return "#9ca3af";
  return "#10b981";
}

const btnDiv = document.getElementById("buttons");

tasks.forEach((t,i)=>{
  const btn = document.createElement("button");
  btn.innerText = t[0];
  btn.style.background = getColor(t[0]);
  btn.onclick = ()=>addTask(t[0], t[1], t[2]);
  btnDiv.appendChild(btn);

  // 🔥 nach jeder 3er Reihe Abstand
  if((i+1)%3===0){
    const spacer = document.createElement("div");
    spacer.className = "group-space";
    btnDiv.appendChild(spacer);
  }
});
</script>

</body>
</html>
