<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punkte Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  color: white;
}

input {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

.section {
  margin-top: 25px;
}

#buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 400px;
  margin: auto;
}

.group-space {
  grid-column: span 3;
  height: 15px;
}

.entry {
  background: #1e293b;
  margin: 5px auto;
  padding: 10px;
  max-width: 400px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.delete {
  background: red;
}

canvas {
  max-width: 400px;
  margin: auto;
}

.export { background: #2563eb; }
.pdf { background: #7c3aed; }
.save { background: #16a34a; }
.reset { background: #dc2626; }
</style>
</head>

<body>

<h2>📊 Punkte Tracker</h2>

<input type="date" id="datePicker">
<br>
<input type="month" id="monthPicker">

<div id="buttons"></div>

<div class="section">
  <h3 id="dayTotal"></h3>
</div>

<div id="dayList"></div>

<div class="section">
  <h3>📅 Monat gesamt:</h3>
  <div id="monthTotal"></div>
</div>

<div class="section">
  <h3>👨‍💼 Chef Abgleich</h3>
  <input type="number" id="bossInput" placeholder="Chef Punkte">
  <button class="save" onclick="saveBoss()">💾 Speichern</button>
  <div id="compareBoss"></div>
</div>

<div class="section">
  <h3>📊 Kategorien</h3>
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <h3>📊 Monatsvergleich</h3>
  <div id="compareMonths"></div>
</div>

<div class="section">
  <button class="export" onclick="exportData()">📄 Export</button>
  <button class="pdf" onclick="createPDF()">📄 PDF</button>
  <button class="reset" onclick="clearAll()">🧹 Reset</button>
</div>

<script>
const tasks = [
  ["Service Wasser", 1.25, "Service"],
  ["Service Kaffee", 1.25, "Service"],
  ["Service Snack", 1.5, "Service"],

  ["Wartung Wasser", 1, "Wartung"],
  ["Wartung Kaffee", 1, "Wartung"],
  ["Wartung Snack", 0.75, "Wartung"],

  ["Installation Wasser", 2, "Installation"],
  ["Installation Kaffee", 2, "Installation"],
  ["Installation Snack", 2, "Installation"],

  ["BVO", 1.25, "Sonstiges"],
  ["Nachrüstung", 1.25, "Sonstiges"],
  ["Krank", 2.75, "Sonstiges"],
  ["Urlaub", 2.75, "Sonstiges"]
];

function getColor(name){
  if(name.includes("Wasser")) return "#3b82f6";
  if(name.includes("Kaffee")) return "#6b3f1d";
  if(name.includes("Snack")) return "#9ca3af";
  return "#10b981";
}

const datePicker = document.getElementById("datePicker");
const monthPicker = document.getElementById("monthPicker");

const today = new Date().toISOString().slice(0,10);
datePicker.value = today;
monthPicker.value = today.slice(0,7);

function loadData() {
  return JSON.parse(localStorage.getItem("points") || "{}");
}

function saveData(data) {
  localStorage.setItem("points", JSON.stringify(data));
}

function loadBoss() {
  return JSON.parse(localStorage.getItem("boss") || "{}");
}

function saveBoss() {
  let boss = loadBoss();
  boss[monthPicker.value] = Number(document.getElementById("bossInput").value);
  localStorage.setItem("boss", JSON.stringify(boss));
  render();
}

function addTask(name, value, category) {
  let data = loadData();
  let date = datePicker.value;

  if (!data[date]) data[date] = [];

  data[date].push({name, value, category});
  saveData(data);
  render();
}

function deleteEntry(index) {
  let data = loadData();
  let date = datePicker.value;

  data[date].splice(index, 1);
  if (data[date].length === 0) delete data[date];

  saveData(data);
  render();
}

function render() {
  const data = loadData();
  const boss = loadBoss();
  const selectedDate = datePicker.value;
  const selectedMonth = monthPicker.value;

  let daySum = 0;
  let monthSum = 0;

  let categories = {
    Service: 0,
    Wartung: 0,
    Installation: 0,
    Sonstiges: 0
  };

  let html = "";

  if (data[selectedDate]) {
    data[selectedDate].forEach((t,i)=>{
      daySum += t.value;

      html += `
      <div class="entry">
        ${t.name} (${t.value})
        <button class="delete" onclick="deleteEntry(${i})">X</button>
      </div>`;
    });
  }

  Object.keys(data).forEach(date=>{
    if(date.startsWith(selectedMonth)){
      data[date].forEach(t=>{
        monthSum += t.value;
        categories[t.category]+=t.value;
      });
    }
  });

  document.getElementById("dayTotal").innerHTML =
    "Tag: "+daySum.toFixed(2);

  document.getElementById("dayList").innerHTML = html;

  document.getElementById("monthTotal").innerHTML =
    monthSum.toFixed(2)+" Punkte";

  drawChart(categories);

  if(boss[selectedMonth]){
    let diff = (monthSum - boss[selectedMonth]).toFixed(2);
    document.getElementById("compareBoss").innerHTML =
      "Chef: "+boss[selectedMonth]+" | Du: "+monthSum+" | Diff: "+diff;
  }

  let prev = new Date(selectedMonth+"-01");
  prev.setMonth(prev.getMonth()-1);
  let prevKey = prev.toISOString().slice(0,7);

  let prevSum = 0;

  Object.keys(data).forEach(date=>{
    if(date.startsWith(prevKey)){
      data[date].forEach(t=>prevSum+=t.value);
    }
  });

  document.getElementById("compareMonths").innerHTML =
    "Aktuell: "+monthSum+
    " | Vormonat: "+prevSum+
    " | Diff: "+(monthSum-prevSum).toFixed(2);
}

let chart;

function drawChart(categories){
  const ctx = document.getElementById("chart");
  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:Object.keys(categories),
      datasets:[{data:Object.values(categories)}]
    }
  });
}

function exportData(){
  const data = loadData();
  let text = "";

  Object.keys(data).forEach(d=>{
    data[d].forEach(t=>{
      text += d+" "+t.name+" "+t.value+"\n";
    });
  });

  alert(text);
}

function createPDF(){
  let win = window.open("");
  win.document.write("<h2>Punkte Bericht</h2>"+document.body.innerHTML);
  win.print();
}

/* 🔐 RESET MIT PASSWORT */
function clearAll(){
  const pw = prompt("Passwort eingeben:");

  if(pw === "2015"){
    if(confirm("Wirklich ALLES löschen?")){
      localStorage.removeItem("points");
      alert("Daten gelöscht");
      render();
    }
  } else {
    alert("Falsches Passwort!");
  }
}

/* 🔥 BUTTONS */
const btnDiv = document.getElementById("buttons");

function createRow(groupName) {
  const wasser = tasks.find(t => t[0] === groupName + " Wasser");
  const kaffee = tasks.find(t => t[0] === groupName + " Kaffee");
  const snack = tasks.find(t => t[0] === groupName + " Snack");

  [wasser, kaffee, snack].forEach(t => {
    if (!t) return;
    const btn = document.createElement("button");
    btn.innerText = t[0];
    btn.style.background = getColor(t[0]);
    btn.onclick = () => addTask(t[0], t[1], t[2]);
    btnDiv.appendChild(btn);
  });

  const spacer = document.createElement("div");
  spacer.className = "group-space";
  btnDiv.appendChild(spacer);
}

createRow("Service");
createRow("Wartung");
createRow("Installation");

tasks.forEach(t => {
  if (
    !t[0].includes("Service") &&
    !t[0].includes("Wartung") &&
    !t[0].includes("Installation")
  ) {
    const btn = document.createElement("button");
    btn.innerText = t[0];
    btn.style.background = getColor(t[0]);
    btn.onclick = () => addTask(t[0], t[1], t[2]);
    btnDiv.appendChild(btn);
  }
});

datePicker.addEventListener("change",render);
monthPicker.addEventListener("change",render);

render();
</script>

</body>
</html>
