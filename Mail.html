<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Vorlagen</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f4f4f4;
    }

    h1 {
        text-align: center;
    }

    .container {
        max-width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea, button {
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        background-color: #007AFF;
        color: white;
        border: none;
        font-weight: bold;
    }

    button:active {
        background-color: #005BBB;
    }
</style>
</head>

<body>

<h1>Email Vorlagen</h1>

<div class="container">
    <h3>Auftragserstellung</h3>

    <label>Serialnummer:</label>
    <input type="text" id="serial" placeholder="Serialnummer eingeben">

    <label>Grund:</label>
    <textarea id="grund" placeholder="Grund eingeben"></textarea>

    <button onclick="sendMail()">Mail erstellen</button>
</div>

<script>
function sendMail() {
    var serial = document.getElementById("serial").value;
    var grund = document.getElementById("grund").value;

    var subject = "Service";

    var body = "Moin,%0D%0A%0D%0A" +
               "mögt ihr mir bitte einmal für folgendes Gerät (" + serial + ") einen Service erstellen?%0D%0A%0D%0A" +
               grund + "%0D%0A%0D%0A" +
               "Danke und schönen Tag";

    var mailtoLink = "mailto:service@coffee-perfect.de" +
                     "?subject=" + encodeURIComponent(subject) +
                     "&body=" + body;

    window.location.href = mailtoLink;
}
</script>

</body>
</html>
