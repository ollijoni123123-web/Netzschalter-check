<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Pro+</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 15px;
}

.container {
  max-width: 550px;
  margin: auto;
}

h1 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

label {
  font-size: 14px;
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.mic { background: #007bff; color: white; }
.add { background: #28a745; color: white; }

ul { list-style: none; padding: 0; }

li {
  background: white;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
}

.task-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.done { text-decoration: line-through; color: gray; }

.meta {
  font-size: 12px;
  color: #555;
}

.actions button {
  width: auto;
  margin-left: 5px;
}

.high { border-left: 5px solid red; }
.medium { border-left: 5px solid orange; }
.low { border-left: 5px solid green; }
</style>
</head>

<body>

<div class="container">
  <h1>🎤 To-Do Pro+</h1>

  <button class="mic" onclick="startRecognition()">🎙️ Sprechen</button>

  <label>📝 Aufgabe</label>
  <input type="text" id="taskInput" placeholder="Aufgabe eingeben">

  <label>⚡ Priorität (optional)</label>
  <select id="priority">
    <option value="">Keine</option>
    <option value="high">🔴 Hoch</option>
    <option value="medium">🟠 Mittel</option>
    <option value="low">🟢 Niedrig</option>
  </select>

  <label for="dueDate">📅 Fälligkeitsdatum (optional)</label>
  <input type="date" id="dueDate">

  <label for="reminderTime">⏰ Erinnerungszeit (optional)</label>
  <input type="time" id="reminderTime">

  <button class="add" onclick="addTask()">➕ Hinzufügen</button>

  <h2>📝 To-Do</h2>
  <ul id="todoList"></ul>

  <h2>✅ Erledigt</h2>
  <ul id="doneList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render() {
  const todo = document.getElementById("todoList");
  const done = document.getElementById("doneList");

  todo.innerHTML = "";
  done.innerHTML = "";

  tasks.forEach((task, i) => {
    const li = document.createElement("li");
    if (task.priority) li.classList.add(task.priority);

    const top = document.createElement("div");
    top.className = "task-top";

    const left = document.createElement("div");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = task.done;

    checkbox.onchange = () => {
      task.done = checkbox.checked;
      save();
      render();
    };

    const text = document.createElement("span");
    text.textContent = " " + task.text;
    if (task.done) text.classList.add("done");

    left.appendChild(checkbox);
    left.appendChild(text);

    const actions = document.createElement("div");
    actions.className = "actions";

    const edit = document.createElement("button");
    edit.textContent = "✏️";
    edit.onclick = () => {
      const newText = prompt("Bearbeiten:", task.text);
      if (newText) {
        task.text = newText;
        save();
        render();
      }
    };

    const del = document.createElement("button");
    del.textContent = "🗑️";
    del.onclick = () => {
      tasks.splice(i, 1);
      save();
      render();
    };

    actions.appendChild(edit);
    actions.appendChild(del);

    top.appendChild(left);
    top.appendChild(actions);

    const meta = document.createElement("div");
    meta.className = "meta";

    let metaText = "";
    if (task.priority) metaText += "Prio: " + task.priority + " ";
    if (task.dueDate) metaText += "| Fällig: " + task.dueDate + " ";
    if (task.reminder) metaText += "| ⏰ " + new Date(task.reminder).toLocaleString();

    meta.textContent = metaText;

    li.appendChild(top);
    if (metaText) li.appendChild(meta);

    if (task.done) done.appendChild(li);
    else todo.appendChild(li);
  });
}

function addTask(textFromVoice = null) {
  const text = textFromVoice || document.getElementById("taskInput").value;
  if (!text) return;

  const priority = document.getElementById("priority").value;
  const dueDate = document.getElementById("dueDate").value;
  const reminderTime = document.getElementById("reminderTime").value;

  let reminder = null;
  if (dueDate && reminderTime) {
    reminder = dueDate + "T" + reminderTime;
  }

  tasks.push({
    text,
    done: false,
    priority,
    dueDate,
    reminder,
    notified: false
  });

  save();
  render();

  document.getElementById("taskInput").value = "";
}

function startRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("❌ Sprachaufnahme nicht unterstützt");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "de-DE";

  recognition.start();

  recognition.onstart = () => {
    alert("🎤 Ich höre zu...");
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    addTask(text);
  };

  recognition.onerror = (event) => {
    alert("Fehler: " + event.error);
  };
}

// 🔔 Reminder Check
setInterval(() => {
  const now = new Date();

  tasks.forEach(task => {
    if (task.reminder && !task.notified) {
      const time = new Date(task.reminder);

      if (now >= time) {
        showNotification(task.text);
        task.notified = true;
        save();
      }
    }
  });
}, 30000);

function showNotification(text) {
  if (Notification.permission === "granted") {
    new Notification("🔔 Aufgabe", { body: text });
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission();
  }
}

render();
</script>

</body>
</html>
