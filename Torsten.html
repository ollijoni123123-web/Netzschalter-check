<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Pro+</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 15px;
}

.container {
  max-width: 550px;
  margin: auto;
}

h1 { text-align: center; }

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.mic { background: #007bff; color: white; }
.add { background: #28a745; color: white; }

ul { list-style: none; padding: 0; }

li {
  background: white;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
}

.task-top {
  display: flex;
  justify-content: space-between;
}

.done { text-decoration: line-through; color: gray; }

.meta { font-size: 12px; }

.actions button {
  width: auto;
  margin-left: 5px;
}

.high { border-left: 5px solid red; }
.medium { border-left: 5px solid orange; }
.low { border-left: 5px solid green; }

.overdue {
  border-left: 5px solid darkred !important;
  background: #ffe5e5;
}

/* 🔥 MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎤 To-Do Pro+</h1>

  <button class="mic" onclick="startRecognition()">🎙️ Sprechen</button>

  <label>📝 Aufgabe</label>
  <input type="text" id="taskInput">

  <label>⚡ Priorität</label>
  <select id="priority">
    <option value="">Keine</option>
    <option value="high">🔴 Hoch</option>
    <option value="medium">🟠 Mittel</option>
    <option value="low">🟢 Niedrig</option>
  </select>

  <label>📅 Datum</label>
  <input type="date" id="dueDate">

  <label>⏰ Uhrzeit</label>
  <input type="time" id="reminderTime">

  <button class="add" onclick="addTask()">➕ Hinzufügen</button>

  <h2>📝 To-Do</h2>
  <ul id="todoList"></ul>

  <h2>✅ Erledigt</h2>
  <ul id="doneList"></ul>
</div>

<!-- 🔥 MODAL -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>✏️ Aufgabe bearbeiten</h3>

    <label>📝 Aufgabe</label>
    <input type="text" id="editText">

    <label>⚡ Priorität</label>
    <select id="editPriority">
      <option value="">Keine</option>
      <option value="high">🔴 Hoch</option>
      <option value="medium">🟠 Mittel</option>
      <option value="low">🟢 Niedrig</option>
    </select>

    <label>📅 Datum</label>
    <input type="date" id="editDate">

    <label>⏰ Uhrzeit</label>
    <input type="time" id="editTime">

    <button onclick="saveEdit()">💾 Speichern</button>
    <button onclick="closeModal()">❌ Abbrechen</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentEditIndex = null;

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render() {
  const todo = document.getElementById("todoList");
  const done = document.getElementById("doneList");

  todo.innerHTML = "";
  done.innerHTML = "";

  tasks.forEach((task, i) => {
    const li = document.createElement("li");

    if (task.priority) li.classList.add(task.priority);

    if (task.dueDate && !task.done) {
      const today = new Date().toISOString().split("T")[0];
      if (task.dueDate < today) li.classList.add("overdue");
    }

    const top = document.createElement("div");
    top.className = "task-top";

    const left = document.createElement("div");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = task.done;

    checkbox.onchange = () => {
      task.done = checkbox.checked;
      save();
      render();
    };

    const text = document.createElement("span");
    text.textContent = " " + task.text;
    if (task.done) text.classList.add("done");

    left.appendChild(checkbox);
    left.appendChild(text);

    const actions = document.createElement("div");

    const edit = document.createElement("button");
    edit.textContent = "✏️";
    edit.onclick = () => openEditModal(i);

    const del = document.createElement("button");
    del.textContent = "🗑️";
    del.onclick = () => {
      tasks.splice(i, 1);
      save();
      render();
    };

    actions.appendChild(edit);
    actions.appendChild(del);

    top.appendChild(left);
    top.appendChild(actions);

    const meta = document.createElement("div");
    let metaText = "";

    if (task.priority) metaText += "Prio: " + task.priority + " ";
    if (task.dueDate) metaText += "| " + task.dueDate + " ";
    if (task.reminder) metaText += "| ⏰ " + new Date(task.reminder).toLocaleString();

    meta.textContent = metaText;

    li.appendChild(top);
    if (metaText) li.appendChild(meta);

    if (task.done) done.appendChild(li);
    else todo.appendChild(li);
  });
}

function addTask(textFromVoice = null) {
  const text = textFromVoice || document.getElementById("taskInput").value;
  if (!text) return;

  const priority = document.getElementById("priority").value;
  const dueDate = document.getElementById("dueDate").value;
  const time = document.getElementById("reminderTime").value;

  let reminder = null;
  if (dueDate && time) reminder = dueDate + "T" + time;

  tasks.push({
    text,
    done: false,
    priority,
    dueDate,
    reminder,
    notified: false
  });

  save();
  render();
}

function openEditModal(index) {
  currentEditIndex = index;
  const task = tasks[index];

  document.getElementById("editText").value = task.text;
  document.getElementById("editPriority").value = task.priority || "";
  document.getElementById("editDate").value = task.dueDate || "";
  document.getElementById("editTime").value =
    task.reminder ? task.reminder.split("T")[1] : "";

  document.getElementById("editModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("editModal").style.display = "none";
}

function saveEdit() {
  const task = tasks[currentEditIndex];

  task.text = document.getElementById("editText").value;
  task.priority = document.getElementById("editPriority").value;
  task.dueDate = document.getElementById("editDate").value;

  const time = document.getElementById("editTime").value;

  if (task.dueDate && time) {
    task.reminder = task.dueDate + "T" + time;
    task.notified = false;
  } else {
    task.reminder = null;
  }

  save();
  render();
  closeModal();
}

function startRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Nicht unterstützt");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "de-DE";
  rec.start();

  rec.onresult = e => addTask(e.results[0][0].transcript);
}

// Reminder
setInterval(() => {
  const now = new Date();
  tasks.forEach(task => {
    if (task.reminder && !task.notified) {
      if (now >= new Date(task.reminder)) {
        new Notification(task.text);
        task.notified = true;
        save();
      }
    }
  });
}, 30000);

// Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

render();
</script>

</body>
</html>
