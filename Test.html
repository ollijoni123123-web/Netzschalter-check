<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seriennummer Scanner PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
}

input {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  background: #0f172a;
  color: white;
}

#result {
  margin-top: 15px;
  font-size: 24px;
  font-weight: bold;
  padding: 10px;
  border-radius: 12px;
}

.ok { background: #064e3b; color: #34d399; }
.bad { background: #7f1d1d; color: #f87171; }
.warn { background: #78350f; color: #fbbf24; }

video {
  width: 100%;
  margin-top: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="card">

<h2>📷 Seriennummer Scanner</h2>

<input type="text" id="serialInput" placeholder="Oder manuell eingeben">

<div id="result"></div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

</div>

<script>

// 🔥 INPUT NORMALISIERUNG (sehr wichtig)
function normalizeInput(input) {
  let text = input.toUpperCase();
  text = text.replace(/O/g, "0");
  text = text.replace(/[^A-Z0-9]/g, "");
  return text;
}

// 🔥 SERIENNUMMER FINDEN (auch bei Müll drumherum)
function extractSerial(text) {
  const cleaned = normalizeInput(text);
  const match = cleaned.match(/(CP\d{2})(\d{8})(\d{3})/);
  if (!match) return null;
  return `${match[1]}-${match[2]}-${match[3]}`;
}

function parseSerial(serial) {
  const p = serial.split("-");
  return {
    model: p[0],
    date: parseInt(p[1]),
    num: parseInt(p[2])
  };
}

function inRange(s, start, end) {
  if (s.model !== start.model) return false;

  const v = s.date * 1000 + s.num;
  const sv = start.date * 1000 + start.num;
  const ev = end.date * 1000 + end.num;

  return v >= sv && v <= ev;
}

const ranges = [
  ["CP20-20231216-001", "CP20-20240428-108"],
  ["CP30-20240128-001", "CP30-20240430-048"],
  ["CP60-20240127-001", "CP60-20240529-018"]
];

function checkSerial(serial) {
  const resultDiv = document.getElementById("result");

  const s = parseSerial(serial);

  const hit = ranges.some(r =>
    inRange(s, parseSerial(r[0]), parseSerial(r[1]))
  );

  if (hit) {
    resultDiv.innerHTML = "⚠️ SCHALTER TAUSCHEN!";
    resultDiv.className = "bad";
  } else {
    resultDiv.innerHTML = "✅ Kein Tausch erforderlich";
    resultDiv.className = "ok";
  }
}

// 🎥 KAMERA START
async function startCamera() {
  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  setInterval(scanFrame, 2000); // alle 2 Sekunden
}

// 🔍 OCR SCAN
let scanning = false;

async function scanFrame() {
  if (scanning) return;
  scanning = true;

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const result = await Tesseract.recognize(canvas, 'eng');

  const text = result.data.text;

  console.log("OCR:", text);

  const serial = extractSerial(text);

  if (serial) {
    document.getElementById("serialInput").value = serial;
    checkSerial(serial);
  }

  scanning = false;
}

// 🚀 START
startCamera();

</script>

</body>
</html>
