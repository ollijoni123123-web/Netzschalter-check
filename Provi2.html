<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Provisions Rechner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/umd/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
h2 { margin-top:30px; }

input, select, button {
    padding:8px;
    margin:5px;
}

.progress {
    width:100%;
    height:25px;
    background:#ddd;
    margin-top:10px;
}
.bar {
    height:100%;
    width:0%;
    background:red;
}

table {
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}
th, td {
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

.kaffee { background:brown; color:white; }
.snack { background:silver; }
.wasser { background:lightblue; }

</style>
</head>

<body>

<h1>Provisions Rechner</h1>

<!-- Eingabe -->
<select id="typ">
    <option value="Kaffee">Kaffee</option>
    <option value="Snack">Snack</option>
    <option value="Wasser">Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>

<h2>Monat wählen</h2>
<input type="month" id="monatFilter" onchange="update()">

<h2>Ziel</h2>
<select id="zielTyp">
    <option value="umsatz">Umsatz</option>
    <option value="provision">Provision</option>
</select>
<input type="number" id="zielWert" placeholder="Ziel eingeben">

<div class="progress">
    <div class="bar" id="progressBar"></div>
</div>

<h2>Statistik</h2>
<p id="geraete"></p>
<p id="week"></p>
<p id="month"></p>

<h3>Abrechnung Vergleich</h3>
<input type="number" id="abrechnung" placeholder="Provision laut Abrechnung">

<canvas id="chart" width="200" height="200"></canvas>

<h2>Einträge</h2>
<table id="table">
<thead>
<tr>
<th>Typ</th>
<th>Umsatz</th>
<th>Provision</th>
<th>Datum</th>
<th>Löschen</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="exportPDF()">PDF Export</button>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function addEntry() {
    let entry = {
        typ: document.getElementById("typ").value,
        umsatz: parseFloat(document.getElementById("umsatz").value),
        provision: parseFloat(document.getElementById("provision").value),
        datum: document.getElementById("datum").value
    };
    data.push(entry);
    localStorage.setItem("data", JSON.stringify(data));
    update();
}

function deleteEntry(i) {
    data.splice(i,1);
    localStorage.setItem("data", JSON.stringify(data));
    update();
}

function update() {
    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    let filter = document.getElementById("monatFilter").value;

    let kaffee=0, snack=0, wasser=0;
    let umsatzMonat=0, provMonat=0;
    let umsatzWoche=0, provWoche=0;

    let now = new Date();
    let weekStart = new Date(now.setDate(now.getDate()-now.getDay()));

    data.forEach((e,i)=>{
        if(filter && !e.datum.startsWith(filter)) return;

        let row = `<tr class="${e.typ.toLowerCase()}">
        <td>${e.typ}</td>
        <td>${e.umsatz}</td>
        <td>${(e.umsatz * e.provision/100).toFixed(2)}</td>
        <td>${e.datum}</td>
        <td><button onclick="deleteEntry(${i})">X</button></td>
        </tr>`;
        tbody.innerHTML += row;

        if(e.typ=="Kaffee") kaffee++;
        if(e.typ=="Snack") snack++;
        if(e.typ=="Wasser") wasser++;

        umsatzMonat += e.umsatz;
        provMonat += e.umsatz * e.provision/100;

        if(new Date(e.datum) >= weekStart) {
            umsatzWoche += e.umsatz;
            provWoche += e.umsatz * e.provision/100;
        }
    });

    document.getElementById("geraete").innerText =
        `Kaffee: ${kaffee} | Snack: ${snack} | Wasser: ${wasser}`;

    document.getElementById("week").innerText =
        `Woche: Umsatz ${umsatzWoche.toFixed(2)}€ | Provision ${provWoche.toFixed(2)}€`;

    document.getElementById("month").innerText =
        `Monat: Umsatz ${umsatzMonat.toFixed(2)}€ | Provision ${provMonat.toFixed(2)}€`;

    updateChart(kaffee, snack, wasser);
    updateProgress(umsatzMonat, provMonat);
}

function updateChart(k,s,w) {
    if(window.chart) window.chart.destroy();

    window.chart = new Chart(document.getElementById("chart"), {
        type:"doughnut",
        data:{
            labels:["Kaffee","Snack","Wasser"],
            datasets:[{
                data:[k,s,w],
                backgroundColor:["brown","silver","blue"]
            }]
        }
    });
}

function updateProgress(umsatz, prov) {
    let ziel = parseFloat(document.getElementById("zielWert").value);
    let typ = document.getElementById("zielTyp").value;

    let wert = typ=="umsatz" ? umsatz : prov;
    let percent = ziel ? (wert/ziel)*100 : 0;

    let bar = document.getElementById("progressBar");
    bar.style.width = percent + "%";

    if(percent >= 101) bar.style.background="purple";
    else if(percent >= 100) bar.style.background="green";
    else bar.style.background="red";
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("Provisions Übersicht", 10,10);
    doc.text(document.getElementById("month").innerText, 10,20);
    doc.text(document.getElementById("week").innerText, 10,30);

    doc.save("provision.pdf");
}

update();
</script>

</body>
</html>
