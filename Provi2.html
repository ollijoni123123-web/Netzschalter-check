<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Provisions Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/umd/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont;
    background:#0f172a;
    color:white;
}

.container {
    padding:15px;
    max-width:500px;
    margin:auto;
}

.card {
    background:#1e293b;
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
}

input, select, button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button {
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

.entry {
    background:#334155;
    padding:10px;
    border-radius:12px;
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.badge {
    padding:5px 10px;
    border-radius:10px;
}

.kaffee { background:brown; }
.snack { background:silver; color:black;}
.wasser { background:#3b82f6; }

.small {
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Dashboard</h2>

<div class="card">
<input type="text" id="kunde" placeholder="Kundenname">

<select id="typ">
<option>Kaffee</option>
<option>Snack</option>
<option>Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<input type="month" id="monatFilter">
<input type="text" id="suche" placeholder="🔍 Kunde suchen..." oninput="update()">
<p id="stats"></p>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Einträge</h3>
<div id="list"></div>
</div>

<div class="card">
<select id="pdfTyp">
<option value="monat">Nur aktueller Monat</option>
<option value="alle">Alle Daten</option>
</select>

<button onclick="exportPDF()">PDF Export</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

// 👉 HEUTE + AKTUELLER MONAT
let today = new Date();
datum.value = today.toISOString().split("T")[0];
monatFilter.value = today.toISOString().slice(0,7);

function addEntry(){
    let e = {
        kunde:kunde.value,
        typ:typ.value,
        umsatz:+umsatz.value,
        provision:+provision.value,
        datum:datum.value
    };

    if(!e.kunde || !e.umsatz || !e.provision){
        alert("Bitte alles ausfüllen!");
        return;
    }

    data.push(e);
    localStorage.setItem("data", JSON.stringify(data));

    // 👉 FELDER LEEREN
    kunde.value="";
    umsatz.value="";
    provision.value="";

    update();
}

function deleteEntry(i){
    data.splice(i,1);
    localStorage.setItem("data", JSON.stringify(data));
    update();
}

function update(){
    let filter = monatFilter.value;
    let search = suche.value.toLowerCase();

    let list = document.getElementById("list");
    list.innerHTML="";

    let k=0,s=0,w=0, um=0, pr=0;

    data.forEach((e,i)=>{
        if(filter && !e.datum.startsWith(filter)) return;
        if(search && !e.kunde.toLowerCase().includes(search)) return;

        let prov = e.umsatz * e.provision/100;

        list.innerHTML += `
        <div class="entry">
            <div>
                <b>${e.kunde}</b><br>
                <span class="badge ${e.typ.toLowerCase()}">${e.typ}</span>
                <div class="small">${e.datum}</div>
            </div>
            <div>
                ${e.umsatz}€<br>
                <b>${prov.toFixed(2)}€</b>
            </div>
            <button onclick="deleteEntry(${i})">❌</button>
        </div>
        `;

        if(e.typ=="Kaffee") k++;
        if(e.typ=="Snack") s++;
        if(e.typ=="Wasser") w++;

        um += e.umsatz;
        pr += prov;
    });

    stats.innerText = `Monat: ${um.toFixed(2)}€ | Provision: ${pr.toFixed(2)}€`;

    updateChart(k,s,w);
}

function updateChart(k,s,w){
    if(window.c) c.destroy();
    c = new Chart(chart,{
        type:"doughnut",
        data:{
            labels:["Kaffee","Snack","Wasser"],
            datasets:[{
                data:[k,s,w],
                backgroundColor:["brown","silver","#3b82f6"]
            }]
        }
    });
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let filter = monatFilter.value;
    let mode = pdfTyp.value;

    let y = 10;
    doc.text("Provisions Übersicht",10,y);
    y+=10;

    data.forEach(e=>{
        if(mode==="monat" && !e.datum.startsWith(filter)) return;

        let prov = e.umsatz * e.provision/100;

        doc.text(`${e.datum} | ${e.kunde} | ${e.typ} | ${e.umsatz}€ | ${prov.toFixed(2)}€`,10,y);
        y+=8;

        if(y>280){
            doc.addPage();
            y=10;
        }
    });

    doc.save("report.pdf");
}

update();
</script>

</body>
</html>
