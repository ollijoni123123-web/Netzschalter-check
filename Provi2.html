<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provisionsrechner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0b1a3a;color:white;}
h1{text-align:center;padding:15px;}
.container{padding:10px;}
.card{background:#132a5e;padding:15px;margin-bottom:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin-top:8px;}
button{background:#2196f3;color:white;border:none;}
.entry{border-bottom:1px solid #2c3e80;padding:8px;}

.progress{background:#1e3c72;border-radius:10px;overflow:hidden;margin-top:10px;}
.progress-bar{height:20px;text-align:center;font-size:12px;}

.red{background:#e53935;}
.yellow{background:#fbc02d;color:black;}
.green{background:#43a047;}
.purple{background:#8e24aa;}

canvas{width:100%!important;height:260px!important;}
</style>
</head>

<body>

<h1>💰 Provisionsrechner</h1>

<div class="container">

<div class="card">
<h3>➕ Eintrag</h3>
<select id="produkt">
<option>Kaffee</option>
<option>Snack</option>
<option>Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<h3>📅 Monat</h3>
<select id="monatFilter" onchange="update()"></select>
</div>

<div class="card">
<h3>🎯 Monatsziel</h3>

<select id="zielTyp" onchange="saveZiel();update();">
<option value="prov">Provision</option>
<option value="umsatz">Umsatz</option>
</select>

<input type="number" id="ziel" placeholder="Ziel €" oninput="saveZiel();update()">

<div class="progress">
<div id="bar" class="progress-bar">0%</div>
</div>
</div>

<div class="card">
<h3>🍩 Diagramm</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>🗓 Einträge</h3>
<div id="liste"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("provData")) || [];
let chart;

// 👉 Ziel speichern
function saveZiel(){
localStorage.setItem("zielData", JSON.stringify({
wert: Number(ziel.value)||0,
typ: zielTyp.value
}));
}

// 👉 Ziel laden
function loadZiel(){
let z = JSON.parse(localStorage.getItem("zielData")) || {};
ziel.value = z.wert || "";
zielTyp.value = z.typ || "prov";
}

// Datum setzen
datum.valueAsDate = new Date();

function save(){
localStorage.setItem("provData", JSON.stringify(data));
}

function addEntry(){
let u=Number(umsatz.value);
let p=Number(provision.value);
let d=datum.value;

if(!u||!p||!d){alert("Bitte alles ausfüllen");return;}

data.push({
id:Date.now(),
produkt:produkt.value,
umsatz:u,
datum:d,
prov:u*p/100
});

save();
fillMonate();
update();

umsatz.value="";
provision.value="";
}

function monthKey(date){
let dt=new Date(date);
return dt.getFullYear()+"-"+dt.getMonth();
}

function fillMonate(){
monatFilter.innerHTML="";
let map={};

data.forEach(e=>map[monthKey(e.datum)]=e.datum);

Object.keys(map).sort().reverse().forEach(k=>{
let d=new Date(map[k]);
let opt=document.createElement("option");
opt.value=k;
opt.text=d.toLocaleString("de-DE",{month:"long",year:"numeric"});
monatFilter.appendChild(opt);
});
}

function update(){

let selected=monatFilter.value;

// 👉 wenn nichts gewählt → letzten Monat nehmen
if(!selected && data.length){
selected=monthKey(data[data.length-1].datum);
monatFilter.value=selected;
}

let prov=0,ums=0;

data.forEach(e=>{
if(monthKey(e.datum)===selected){
prov+=e.prov;
ums+=e.umsatz;
}
});

// 👉 Ziel sauber lesen
let zielVal = Number(ziel.value);

if(!zielVal || zielVal<=0){
bar.style.width="0%";
bar.innerText="0%";
return;
}

let val = zielTyp.value==="umsatz"?ums:prov;

// 👉 HIER IST DER FIX
let percent = (val / zielVal) * 100;
if(!isFinite(percent)) percent=0;

// 👉 Balken max 100
let width = Math.min(percent,100);

bar.style.width = width + "%";

// 👉 TEXT = echter Wert
bar.innerText =
percent.toFixed(1)+"% ("+
val.toFixed(2)+"€ / "+
zielVal.toFixed(2)+"€)";

// Farben
bar.className="progress-bar";
if(percent>120)bar.classList.add("purple");
else if(percent>=100)bar.classList.add("green");
else if(percent>=50)bar.classList.add("yellow");
else bar.classList.add("red");

// Diagramm
draw(prov,ums);

// Liste
render(selected);
}

function render(selected){
liste.innerHTML="";

data.forEach(e=>{
if(monthKey(e.datum)!==selected)return;

let div=document.createElement("div");
div.className="entry";
div.innerHTML=
"<b>"+e.datum+"</b> | "+e.produkt+" | "+e.umsatz+"€ → "+e.prov.toFixed(2)+"€";
liste.appendChild(div);
});
}

function draw(p,u){
if(chart)chart.destroy();
chart=new Chart(chartEl,{
type:"doughnut",
data:{
labels:["Provision","Umsatz"],
datasets:[{data:[p,u]}]
}
});
}

let chartEl=document.getElementById("chart");

// INIT
loadZiel();
fillMonate();
update();
</script>

</body>
</html>
