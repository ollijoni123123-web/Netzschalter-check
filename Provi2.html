<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provisionsrechner PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0b1a3a;color:white;}
h1{text-align:center;padding:15px;}
.container{padding:10px;}
.card{background:#132a5e;padding:15px;margin-bottom:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin-top:8px;}
button{background:#2196f3;color:white;border:none;}
.entry{border-bottom:1px solid #2c3e80;padding:8px;}
.progress{background:#1e3c72;border-radius:10px;overflow:hidden;margin-top:10px;}
.progress-bar{height:20px;background:#4caf50;text-align:center;font-size:12px;}
canvas{width:100%!important;height:260px!important;}
</style>
</head>

<body>

<h1>💰 Provisionsrechner</h1>

<div class="container">

<div class="card">
<h3>➕ Eintrag</h3>
<select id="produkt">
<option value="Kaffee">☕ Kaffee</option>
<option value="Snack">🍫 Snack</option>
<option value="Wasser">💧 Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<h3>📅 Monat auswählen</h3>
<select id="monatFilter" onchange="update()"></select>
</div>

<div class="card">
<h3>📊 Monatsübersicht</h3>
<p id="monat"></p>
<p id="trend"></p>
</div>

<div class="card">
<h3>🎯 Monatsziel</h3>

<select id="zielTyp" onchange="update()">
<option value="prov">Provision</option>
<option value="umsatz">Umsatz</option>
</select>

<input type="number" id="ziel" placeholder="Ziel €" oninput="update()">

<div class="progress">
<div id="progressBar" class="progress-bar">0%</div>
</div>
</div>

<div class="card">
<h3>📅 Wochenübersicht</h3>
<div id="wochen"></div>
</div>

<div class="card">
<h3>📦 Kategorien</h3>
<p id="stats"></p>
</div>

<div class="card">
<h3>📊 Geräte verkauft</h3>
<p id="anzahl"></p>
</div>

<div class="card">
<h3>🍩 Diagramm</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📊 Monatsvergleich</h3>
<canvas id="vergleichChart"></canvas>
</div>

<div class="card">
<h3>🗓 Einträge</h3>
<div id="liste"></div>
</div>

<div class="card">
<h3>📄 Export</h3>
<button onclick="exportPDF()">PDF Bericht</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("provData")) || [];
let chart, vergleichChart;

// HEUTE setzen
document.getElementById("datum").valueAsDate = new Date();

function save(){
    localStorage.setItem("provData", JSON.stringify(data));
}

function addEntry(){
    let u = parseFloat(document.getElementById("umsatz").value);
    let pr = parseFloat(document.getElementById("provision").value);
    let d = document.getElementById("datum").value;
    let p = document.getElementById("produkt").value;

    if(isNaN(u) || isNaN(pr) || !d){
        alert("Bitte alles korrekt ausfüllen!");
        return;
    }

    data.push({
        id: Date.now(),
        produkt: p,
        umsatz: u,
        datum: d,
        prov: u * pr / 100
    });

    save();

    // Felder leeren
    document.getElementById("umsatz").value = "";
    document.getElementById("provision").value = "";

    fillMonate();
    update();
}

function monthKey(date){
    let dt = new Date(date);
    return dt.getFullYear()+"-"+dt.getMonth();
}

function fillMonate(){
    let select = document.getElementById("monatFilter");
    select.innerHTML = "";

    let map = {};
    data.forEach(e=> map[monthKey(e.datum)] = e.datum);

    Object.keys(map).sort().reverse().forEach(k=>{
        let d = new Date(map[k]);
        let opt = document.createElement("option");
        opt.value = k;
        opt.text = d.toLocaleString("de-DE",{month:"long",year:"numeric"});
        select.appendChild(opt);
    });
}

function getLastMonth(key){
    let [y,m] = key.split("-").map(Number);
    let d = new Date(y, m-1, 1);
    return d.getFullYear()+"-"+d.getMonth();
}

function getWeek(date){
    let d=new Date(date);
    let start=new Date(d.getFullYear(),d.getMonth(),1);
    return Math.ceil((d.getDate()+start.getDay())/7);
}

function update(){
    let selected = document.getElementById("monatFilter").value;

    let sum=0,last=0,umsatzSum=0;
    let kaffe=0,snack=0,wasser=0;
    let countK=0,countS=0,countW=0,weeks={};

    let lastKey = selected ? getLastMonth(selected) : null;

    data.forEach(e=>{
        let k = monthKey(e.datum);

        if(k===selected){
            sum+=e.prov;
            umsatzSum+=e.umsatz;

            let w=getWeek(e.datum);
            weeks[w]=(weeks[w]||0)+e.prov;

            if(e.produkt==="Kaffee"){kaffe+=e.prov;countK++;}
            if(e.produkt==="Snack"){snack+=e.prov;countS++;}
            if(e.produkt==="Wasser"){wasser+=e.prov;countW++;}
        }

        if(k===lastKey) last+=e.prov;
    });

    document.getElementById("monat").innerText="Provision: "+sum.toFixed(2)+" €";

    let diff=sum-last;
    document.getElementById("trend").innerText = diff>=0
        ? "📈 +" + diff.toFixed(2) + " € besser"
        : "📉 " + diff.toFixed(2) + " € schlechter";

    let zielVal=parseFloat(document.getElementById("ziel").value)||0;
    let typ=document.getElementById("zielTyp").value;

    let currentValue = typ==="umsatz" ? umsatzSum : sum;

    let percent=zielVal?(currentValue/zielVal*100):0;
    percent=Math.min(percent,100);

    let bar=document.getElementById("progressBar");
    bar.style.width=percent+"%";
    bar.innerText=percent.toFixed(0)+"%";

    document.getElementById("stats").innerHTML=
        "Kaffee: "+kaffe.toFixed(2)+" €<br>"+
        "Snack: "+snack.toFixed(2)+" €<br>"+
        "Wasser: "+wasser.toFixed(2)+" €";

    document.getElementById("anzahl").innerHTML=
        "Kaffee: "+countK+" Stück<br>"+
        "Snack: "+countS+" Stück<br>"+
        "Wasser: "+countW+" Stück";

    render(selected);
}

function render(selected){
    let liste=document.getElementById("liste");
    liste.innerHTML="";

    data.forEach(e=>{
        if(monthKey(e.datum)!==selected) return;

        let div=document.createElement("div");
        div.className="entry";
        div.innerHTML="<b>"+e.datum+"</b> | "+e.produkt+" | "+e.umsatz+"€ → "+e.prov.toFixed(2)+"€<br>"+
        "<button onclick='del("+e.id+")'>❌ Löschen</button>";

        liste.appendChild(div);
    });
}

function del(id){
    data=data.filter(e=>e.id!==id);
    save();fillMonate();update();
}

fillMonate();
update();
</script>

</body>
</html>
