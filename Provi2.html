<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Provisions Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/umd/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont;
    background:#0f172a;
    color:white;
}

.container {
    padding:15px;
    max-width:500px;
    margin:auto;
}

.card {
    background:#1e293b;
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
}

select, input, button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button {
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

.progress {
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    height:20px;
}

.bar {
    height:100%;
    width:0%;
    transition:0.5s;
}

.entry {
    background:#334155;
    padding:10px;
    border-radius:12px;
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.badge {
    padding:5px 10px;
    border-radius:10px;
}

.kaffee { background:brown; }
.snack { background:silver; color:black;}
.wasser { background:#3b82f6; }

.small {
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Dashboard</h2>

<div class="card">
<input type="text" id="kunde" placeholder="Kundenname">

<select id="typ">
<option>Kaffee</option>
<option>Snack</option>
<option>Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<input type="month" id="monatFilter" onchange="update()">
<p id="stats"></p>
</div>

<div class="card">
<select id="zielTyp">
<option value="umsatz">Umsatz</option>
<option value="provision">Provision</option>
</select>

<input type="number" id="zielWert" placeholder="Ziel">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="percentText"></p>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Einträge</h3>
<div id="list"></div>
</div>

<div class="card">
<button onclick="exportPDF()">PDF Export</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

// 👉 HEUTIGES DATUM AUTOMATISCH SETZEN
document.getElementById("datum").value = new Date().toISOString().split("T")[0];

function addEntry(){
    let e = {
        kunde:kunde.value,
        typ:typ.value,
        umsatz:+umsatz.value,
        provision:+provision.value,
        datum:datum.value
    };

    if(!e.kunde || !e.umsatz || !e.provision) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    data.push(e);
    localStorage.setItem("data", JSON.stringify(data));
    update();
}

function deleteEntry(i){
    data.splice(i,1);
    localStorage.setItem("data", JSON.stringify(data));
    update();
}

function update(){
    let filter = monatFilter.value;
    let list = document.getElementById("list");
    list.innerHTML="";

    let k=0,s=0,w=0, um=0, pr=0;

    data.forEach((e,i)=>{
        if(filter && !e.datum.startsWith(filter)) return;

        let prov = e.umsatz * e.provision/100;

        list.innerHTML += `
        <div class="entry">
            <div>
                <b>${e.kunde}</b><br>
                <span class="badge ${e.typ.toLowerCase()}">${e.typ}</span>
                <div class="small">${e.datum}</div>
            </div>
            <div>
                ${e.umsatz}€<br>
                <b>${prov.toFixed(2)}€</b>
            </div>
            <button onclick="deleteEntry(${i})">❌</button>
        </div>
        `;

        if(e.typ=="Kaffee") k++;
        if(e.typ=="Snack") s++;
        if(e.typ=="Wasser") w++;

        um += e.umsatz;
        pr += prov;
    });

    stats.innerText = `Monat: ${um.toFixed(2)}€ | Provision: ${pr.toFixed(2)}€`;

    updateChart(k,s,w);
    updateBar(um,pr);
}

function updateChart(k,s,w){
    if(window.c) c.destroy();
    c = new Chart(chart,{
        type:"doughnut",
        data:{
            labels:["Kaffee","Snack","Wasser"],
            datasets:[{
                data:[k,s,w],
                backgroundColor:["brown","silver","#3b82f6"]
            }]
        }
    });
}

function updateBar(um,pr){
    let ziel = parseFloat(zielWert.value);
    let typ = zielTyp.value;
    let val = typ=="umsatz"?um:pr;

    let percent = ziel ? (val/ziel)*100 : 0;

    bar.style.width = percent+"%";
    percentText.innerText = percent.toFixed(1) + "% erreicht";

    if(percent>=101) bar.style.background="purple";
    else if(percent>=100) bar.style.background="green";
    else bar.style.background="red";
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("Dashboard Übersicht",10,10);
    doc.text(stats.innerText,10,20);

    doc.save("report.pdf");
}

update();
</script>

</body>
</html>
