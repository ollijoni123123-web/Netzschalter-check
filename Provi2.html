<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Provisions Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:-apple-system; background:#0f172a; color:white;}
.container { padding:15px; max-width:500px; margin:auto;}
.card { background:#1e293b; border-radius:20px; padding:15px; margin-bottom:15px;}

input, select, button {
    width:100%; padding:12px; margin-top:8px;
    border:none; border-radius:10px;
}

button { background:#3b82f6; color:white;}

.big { font-size:26px; font-weight:bold; }

.entry { background:#334155; padding:10px; border-radius:12px; margin-top:8px;}
.storno { opacity:0.4; text-decoration:line-through;}

.actions button { margin-top:5px; }

.badge { padding:5px 10px; border-radius:10px;}
.kaffee { background:brown; }
.snack { background:silver; color:black;}
.wasser { background:#3b82f6; }

</style>
</head>

<body>
<div class="container">

<h2>📊 Dashboard PRO</h2>

<div class="card">
<input id="kunde" placeholder="Kundenname">

<select id="typ">
<option>Kaffee</option>
<option>Snack</option>
<option>Wasser</option>
</select>

<input id="umsatz" type="number" placeholder="Umsatz €">
<input id="provision" type="number" placeholder="Provision %">
<input id="datum" type="date">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<input type="month" id="monatFilter" onchange="update()">
<input type="text" id="suche" placeholder="🔍 Kunde suchen..." oninput="update()">

<div class="big" id="umsatzBig"></div>
<div class="big" id="provBig"></div>
<div id="trend"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card" id="list"></div>

<div class="card">
<select id="pdfTyp">
<option value="monat">Aktueller Monat</option>
<option value="alle">Komplett</option>
</select>
<button onclick="exportPDF()">📄 PDF Export</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

// Standard Datum + Monat
let today = new Date();
datum.value = today.toISOString().split("T")[0];
monatFilter.value = today.toISOString().slice(0,7);

function addEntry(){
    let e = {
        kunde:kunde.value,
        typ:typ.value,
        umsatz:+umsatz.value,
        provision:+provision.value,
        datum:datum.value,
        storno:false
    };

    if(!e.kunde || !e.umsatz || !e.provision){
        alert("Bitte alles ausfüllen");
        return;
    }

    data.push(e);
    localStorage.setItem("data", JSON.stringify(data));

    kunde.value="";
    umsatz.value="";
    provision.value="";

    update();
}

function deleteEntry(i){
    if(confirm("Wirklich löschen?")){
        data.splice(i,1);
        localStorage.setItem("data", JSON.stringify(data));
        update();
    }
}

function toggleStorno(i){
    data[i].storno = !data[i].storno;
    localStorage.setItem("data", JSON.stringify(data));
    update();
}

function getMonthSum(month){
    let um=0, pr=0;

    data.forEach(e=>{
        if(e.datum.startsWith(month) && !e.storno){
            um += e.umsatz;
            pr += e.umsatz * e.provision/100;
        }
    });

    return {um,pr};
}

function update(){
    let filter = monatFilter.value;
    let search = suche.value.toLowerCase();

    let list = document.getElementById("list");
    list.innerHTML="";

    let {um,pr} = getMonthSum(filter);

    // Trend
    let d = new Date(filter+"-01");
    d.setMonth(d.getMonth()-1);
    let lastMonth = d.toISOString().slice(0,7);
    let last = getMonthSum(lastMonth);

    let diff = um - last.um;

    if(diff>0) trend.innerHTML = `📈 +${diff.toFixed(2)}€`;
    else if(diff<0) trend.innerHTML = `📉 ${diff.toFixed(2)}€`;
    else trend.innerHTML = `➖ 0€`;

    umsatzBig.innerText = `💰 ${um.toFixed(2)}€`;
    provBig.innerText = `💸 ${pr.toFixed(2)}€`;

    let k=0,s=0,w=0;

    data.forEach((e,i)=>{
        if(filter && !e.datum.startsWith(filter)) return;
        if(search && !e.kunde.toLowerCase().includes(search)) return;

        let prov = e.umsatz * e.provision/100;

        if(!e.storno){
            if(e.typ=="Kaffee") k++;
            if(e.typ=="Snack") s++;
            if(e.typ=="Wasser") w++;
        }

        list.innerHTML += `
        <div class="entry ${e.storno?'storno':''}">
            <b>${e.kunde}</b><br>
            <span class="badge ${e.typ.toLowerCase()}">${e.typ}</span><br>
            ${e.umsatz}€ | ${prov.toFixed(2)}€<br>
            ${e.datum}

            <div class="actions">
                <button onclick="toggleStorno(${i})">
                    ${e.storno?"Rückgängig":"Storno"}
                </button>
                <button onclick="deleteEntry(${i})">❌ Löschen</button>
            </div>
        </div>`;
    });

    updateChart(k,s,w);
}

function updateChart(k,s,w){
    if(window.c) c.destroy();
    c = new Chart(chart,{
        type:"doughnut",
        data:{
            labels:["Kaffee","Snack","Wasser"],
            datasets:[{
                data:[k,s,w],
                backgroundColor:["brown","silver","#3b82f6"]
            }]
        }
    });
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let mode = pdfTyp.value;
    let filter = monatFilter.value;

    let y = 10;
    doc.setFontSize(14);
    doc.text("Provisionsbericht",10,y);
    y += 10;

    let totalU=0, totalP=0;

    data.forEach(e=>{
        if(mode==="monat" && !e.datum.startsWith(filter)) return;

        let prov = e.umsatz * e.provision/100;

        if(!e.storno){
            totalU += e.umsatz;
            totalP += prov;
        }

        let text = `${e.datum} | ${e.kunde} | ${e.typ} | ${e.umsatz}€ | ${prov.toFixed(2)}€`;
        if(e.storno) text += " (STORNO)";

        doc.setFontSize(10);
        doc.text(text,10,y);
        y += 6;

        if(y > 280){
            doc.addPage();
            y = 10;
        }
    });

    y += 10;
    doc.setFontSize(12);
    doc.text(`Gesamt Umsatz: ${totalU.toFixed(2)}€`,10,y);
    y += 8;
    doc.text(`Gesamt Provision: ${totalP.toFixed(2)}€`,10,y);

    doc.save("Provisionsbericht.pdf");
}

update();
</script>

</body>
</html>
