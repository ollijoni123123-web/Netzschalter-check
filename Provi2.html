<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Provisions Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/umd/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family: -apple-system;
    background:#0f172a;
    color:white;
}

.container {
    padding:15px;
    max-width:500px;
    margin:auto;
}

.card {
    background:#1e293b;
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
}

input, select, button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button {
    background:#3b82f6;
    color:white;
}

.big {
    font-size:28px;
    font-weight:bold;
}

.entry {
    background:#334155;
    padding:10px;
    border-radius:12px;
    margin-top:8px;
}

.storno {
    opacity:0.5;
    text-decoration:line-through;
}

.badge {
    padding:5px 10px;
    border-radius:10px;
}

.kaffee { background:brown; }
.snack { background:silver; color:black;}
.wasser { background:#3b82f6; }

</style>
</head>

<body>

<div class="container">

<h2>📊 Dashboard PRO</h2>

<div class="card">
<input type="text" id="kunde" placeholder="Kundenname">

<select id="typ">
<option>Kaffee</option>
<option>Snack</option>
<option>Wasser</option>
</select>

<input type="number" id="umsatz" placeholder="Umsatz €">
<input type="number" id="provision" placeholder="Provision %">
<input type="date" id="datum">

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<input type="month" id="monatFilter" onchange="update()">

<div class="big" id="umsatzBig"></div>
<div class="big" id="provBig"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<div id="list"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

// 👉 Standardwerte
let today = new Date();
datum.value = today.toISOString().split("T")[0];
monatFilter.value = today.toISOString().slice(0,7);

function addEntry(){
    let e = {
        kunde:kunde.value,
        typ:typ.value,
        umsatz:+umsatz.value,
        provision:+provision.value,
        datum:datum.value,
        storno:false
    };

    if(!e.kunde || !e.umsatz || !e.provision){
        alert("Bitte alles ausfüllen!");
        return;
    }

    data.push(e);
    localStorage.setItem("data", JSON.stringify(data));

    kunde.value="";
    umsatz.value="";
    provision.value="";

    update();
}

function toggleStorno(i){
    data[i].storno = !data[i].storno;
    localStorage.setItem("data", JSON.stringify(data));
    update();
}

function update(){
    let filter = monatFilter.value;
    let list = document.getElementById("list");
    list.innerHTML="";

    let k=0,s=0,w=0, um=0, pr=0;

    data.forEach((e,i)=>{
        if(filter && !e.datum.startsWith(filter)) return;

        let prov = e.umsatz * e.provision/100;

        // 👉 STORNO ABZIEHEN
        if(!e.storno){
            um += e.umsatz;
            pr += prov;

            if(e.typ=="Kaffee") k++;
            if(e.typ=="Snack") s++;
            if(e.typ=="Wasser") w++;
        }

        list.innerHTML += `
        <div class="entry ${e.storno ? 'storno':''}">
            <b>${e.kunde}</b><br>
            <span class="badge ${e.typ.toLowerCase()}">${e.typ}</span><br>
            ${e.umsatz}€ | ${prov.toFixed(2)}€<br>
            ${e.datum}<br>
            <button onclick="toggleStorno(${i})">
                ${e.storno ? 'Rückgängig' : 'Storno'}
            </button>
        </div>
        `;
    });

    umsatzBig.innerText = `💰 Umsatz: ${um.toFixed(2)}€`;
    provBig.innerText = `💸 Provision: ${pr.toFixed(2)}€`;

    updateChart(k,s,w);
}

function updateChart(k,s,w){
    if(window.c) c.destroy();
    c = new Chart(chart,{
        type:"doughnut",
        data:{
            labels:["Kaffee","Snack","Wasser"],
            datasets:[{
                data:[k,s,w],
                backgroundColor:["brown","silver","#3b82f6"]
            }]
        }
    });
}

update();
</script>

</body>
</html>
