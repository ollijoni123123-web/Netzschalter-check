<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seriennummer Checker</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 30px;
}

h1 {
  margin-bottom: 30px;
}

input {
  padding: 15px;
  width: 90%;
  max-width: 400px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 15px;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
}

#result {
  margin-top: 25px;
  font-size: 24px;
  font-weight: bold;
}

.history {
  margin-top: 40px;
  text-align: left;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.history div {
  background: #1e293b;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🔧 Seriennummer Prüfer</h1>

<input type="text" id="serialInput" placeholder="z.B. CP20-20240101-050">
<br>
<button onclick="checkSerial()">Prüfen</button>

<div id="result"></div>

<div class="history" id="history"></div>

<script>
function parseSerial(serial) {
  const parts = serial.split("-");
  if (parts.length !== 3) return null;

  return {
    model: parts[0],
    date: parseInt(parts[1]),
    number: parseInt(parts[2])
  };
}

function isInRange(serial, start, end) {
  if (serial.model !== start.model) return false;

  const val = serial.date * 1000 + serial.number;
  const startVal = start.date * 1000 + start.number;
  const endVal = end.date * 1000 + end.number;

  return val >= startVal && val <= endVal;
}

const ranges = [
  { start: parseSerial("CP20-20231216-001"), end: parseSerial("CP20-20240428-108") },
  { start: parseSerial("CP30-20240128-001"), end: parseSerial("CP30-20240430-048") },
  { start: parseSerial("CP60-20240127-001"), end: parseSerial("CP60-20240529-018") }
];

function checkSerial() {
  const input = document.getElementById("serialInput").value.trim();
  const resultDiv = document.getElementById("result");

  const serial = parseSerial(input);

  if (!serial) {
    resultDiv.innerHTML = "❌ Ungültige Seriennummer";
    resultDiv.style.color = "orange";
    return;
  }

  const needs = ranges.some(r => isInRange(serial, r.start, r.end));

  if (needs) {
    resultDiv.innerHTML = "⚠️ SCHALTER TAUSCHEN!";
    resultDiv.style.color = "red";
  } else {
    resultDiv.innerHTML = "✅ Alles OK";
    resultDiv.style.color = "lightgreen";
  }

  saveHistory(input, needs);
}

function saveHistory(serial, status) {
  let history = JSON.parse(localStorage.getItem("history") || "[]");

  history.unshift({
    serial,
    status: status ? "TAUSCH" : "OK",
    time: new Date().toLocaleString()
  });

  history = history.slice(0, 10);
  localStorage.setItem("history", JSON.stringify(history));

  renderHistory();
}

function renderHistory() {
  const historyDiv = document.getElementById("history");
  const history = JSON.parse(localStorage.getItem("history") || "[]");

  historyDiv.innerHTML = "<h3>Letzte Prüfungen</h3>";

  history.forEach(item => {
    historyDiv.innerHTML += `<div>${item.serial} → ${item.status}</div>`;
  });
}

renderHistory();
</script>

</body>
</html>
