<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seriennummer Checker PRO</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  outline: none;
  margin-top: 10px;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #3b82f6;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #2563eb;
}

#result {
  margin-top: 20px;
  font-size: 26px;
  font-weight: bold;
  padding: 15px;
  border-radius: 12px;
}

.ok {
  background: #064e3b;
  color: #34d399;
}

.bad {
  background: #7f1d1d;
  color: #f87171;
}

.warn {
  background: #78350f;
  color: #fbbf24;
}

.history {
  margin-top: 25px;
  text-align: left;
}

.history h3 {
  margin-bottom: 10px;
}

.history-item {
  background: #0f172a;
  padding: 12px;
  border-radius: 10px;
  margin-top: 6px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.status-ok {
  color: #34d399;
}

.status-bad {
  color: #f87171;
}
</style>
</head>

<body>

<div class="card">

<h1>🔧 Seriennummer Checker</h1>

<input type="text" id="serialInput" placeholder="Seriennummer eingeben">

<button onclick="checkSerial()">🔍 Prüfen</button>

<div id="result"></div>

<div class="history" id="history"></div>

</div>

<script>

// 🔥 Input verbessern
function normalizeInput(input) {
  let text = input.toUpperCase();
  text = text.replace(/O/g, "0");
  text = text.replace(/[^A-Z0-9]/g, "");
  return text;
}

function extractSerial(input) {
  const cleaned = normalizeInput(input);
  const match = cleaned.match(/(CP\d{2})(\d{8})(\d{3})/);
  if (!match) return null;
  return `${match[1]}-${match[2]}-${match[3]}`;
}

function parseSerial(serial) {
  const p = serial.split("-");
  return {
    model: p[0],
    date: parseInt(p[1]),
    num: parseInt(p[2])
  };
}

function inRange(s, start, end) {
  if (s.model !== start.model) return false;

  const v = s.date * 1000 + s.num;
  const sv = start.date * 1000 + start.num;
  const ev = end.date * 1000 + end.num;

  return v >= sv && v <= ev;
}

const ranges = [
  ["CP20-20231216-001", "CP20-20240428-108"],
  ["CP30-20240128-001", "CP30-20240430-048"],
  ["CP60-20240127-001", "CP60-20240529-018"]
];

function checkSerial() {
  const raw = document.getElementById("serialInput").value;
  const resultDiv = document.getElementById("result");

  const serial = extractSerial(raw);

  if (!serial) {
    resultDiv.innerHTML = "❌ Seriennummer nicht erkannt";
    resultDiv.className = "warn";
    return;
  }

  document.getElementById("serialInput").value = serial;

  const s = parseSerial(serial);

  const hit = ranges.some(r =>
    inRange(s, parseSerial(r[0]), parseSerial(r[1]))
  );

  if (hit) {
    resultDiv.innerHTML = "⚠️ SCHALTER TAUSCHEN!";
    resultDiv.className = "bad";
  } else {
    resultDiv.innerHTML = "✅ Kein Tausch erforderlich";
    resultDiv.className = "ok";
  }

  saveHistory(serial, hit);
}

// 📋 Verlauf
function saveHistory(serial, status) {
  let history = JSON.parse(localStorage.getItem("history") || "[]");

  history.unshift({
    serial,
    status: status ? "TAUSCH" : "OK"
  });

  history = history.slice(0, 10);
  localStorage.setItem("history", JSON.stringify(history));

  renderHistory();
}

function renderHistory() {
  const historyDiv = document.getElementById("history");
  const history = JSON.parse(localStorage.getItem("history") || "[]");

  historyDiv.innerHTML = "<h3>📋 Letzte Prüfungen</h3>";

  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
      <span>${item.serial}</span>
      <span class="${item.status === 'TAUSCH' ? 'status-bad' : 'status-ok'}">
        ${item.status}
      </span>
    `;

    div.onclick = () => {
      document.getElementById("serialInput").value = item.serial;
      checkSerial();
    };

    historyDiv.appendChild(div);
  });
}

renderHistory();

</script>

</body>
</html>
